# ============================================================
# nav_daemon.yaml
# 在线导航守护进程 nav_daemon 的主配置文件（ESKF 在线版）
#
# 说明：
#   - 对应 nav_core::app::NavDaemonConfig 及其子结构；
#   - 因子图已下线，仅保留 Online ESKF + 健康监测；
#   - 部分参数参考离线 ESKF 2D 配置做了数值对齐。
# ============================================================

# ------------------------------------------------------------
# 1. 主循环 & 时间相关
# ------------------------------------------------------------
loop:
  # 导航主循环频率（Hz）
  # - 每个周期：从 IMU/DVL 缓冲取最新样本 → OnlineEstimator 更新 → 发布 NavState
  nav_loop_hz: 50.0

  # 若“最新 IMU 样本时间”距离当前 mono 时刻超过该阈值，视为 IMU 掉线 / 失效
  max_imu_age_s: 0.2

  # 若“最新 DVL 样本时间”距离当前 mono 时刻超过该阈值，视为 DVL 不在线
  max_dvl_age_s: 3.0

  # 因子图已下线，smoother_window_s 不再使用；如有老配置可删除


# ------------------------------------------------------------
# 2. IMU 子系统
#   - 驱动：香橙派 + HWT9073-485 (Modbus)
#   - 实时预处理：静止窗 / deadband / 简单滤波
# ------------------------------------------------------------
imu:
  # 是否启用 IMU 链路（一般为 true；调试 DVL-only 可以临时关掉）
  enable: true

  # 2.1 底层驱动配置（对应 nav_core::ImuConfig）
  driver:
    # 串口设备路径
    #
    # 建议：留空，让 nav_daemon 在启动阶段自动扫描并主动探测 IMU 口。
    # 这样可以利用“电压板会持续回传文本、IMU 需要主机发 Modbus 请求才回包”的特性，
    # 避免依赖硬编码 /dev/ttyUSBx（容易因重枚举跳变）。
    port: ""

    # 波特率（你当前 IMU 配置为 230400）
    baud: 230400

    # Modbus 从机地址（HWT9073 默认 0x50）
    slave_addr: 0x50

    # IMU 硬门控过滤（types.hpp 中 ImuFilterConfig）
    filter:
      enable_accel: true      # 是否检查加速度幅值
      enable_gyro:  true      # 是否检查角速度幅值
      enable_euler: false     # 是否检查欧拉角（如只用 yaw，可先关掉）

      max_abs_accel: 50.0     # 单轴最大 |a| (m/s^2)，约 5g
      max_abs_gyro:  10.0     # 单轴最大 |ω| (rad/s)
      max_euler_abs: 3.5      # 单轴最大 |姿态| (rad)

  # 2.2 实时预处理配置（对应 nav_core::preprocess::ImuRtPreprocessConfig）
  #
  # 对应 C++ 里的 ImuRtPreprocessConfig 字段：
  #   - basic: ImuFilterConfig（再做一层 basic 有效性检查）
  #   - static_window_*: 启动静止窗零偏估计
  #   - g_ref_m_s2 / enable_gravity_compensation: 重力补偿
  #   - yaw_lpf_* / *deadband*: yaw 一阶低通 + 全轴 deadband
  #   - use_imu_rp_from_sample: roll/pitch 来源于 IMU 自带姿态

  preprocess:
    # 2.2.1 basic 有效性检查（再过一层 ImuFilterConfig）
     # 说明：零偏完全由实时静止窗估计，不从 YAML 读取固定值
    basic:
      enable_accel: true
      enable_gyro:  true
      enable_euler: false

      max_abs_accel: 50.0     # 和 driver.filter 保持一致即可
      max_abs_gyro:  10.0
      max_euler_abs: 3.5

    # 2.2.2 静止窗 / bias 估计参数
    #
    # 离线 ESKF 用的是前 20s 做 bias 估计，这里沿用 20s，
    # 如果你希望上电后更快进入工作状态，可以改成 5~10s。
    static_window_s: 20.0          # 连续静止累计时间 ≥ 该值时认为 bias_ready
    static_max_abs_gyro: 0.01      # |ω| < 0.01 rad/s 视为静止
    static_max_abs_accel_dev: 0.05 # ||a|-g_ref| < 0.05 m/s^2 视为静止
    static_max_samples: 10000      # 静止窗内最大样本数（用于 std 估计）

    # 2.2.3 重力参考与补偿
    #
    # 离线 ESKF 配置为 imu.acc_is_linear = true，
    # 所以这里必须做重力补偿，保证输入给 ESKF 的是“线加速度”。
    g_ref_m_s2: 9.78
    enable_gravity_compensation: true

    # 2.2.4 yaw 轴滤波 + deadband
    #
    # 2 Hz 截止频率 + 0.001 rad/s deadband：压掉低频飘 + 小噪声。
    yaw_lpf_cutoff_hz: 2.0
    yaw_deadband_rad_s: 0.001

    # 2.2.5 全轴 deadband
    gyro_deadband_rad_s: 0.002     # X/Y 轴 gyro deadband，Z 轴取 max(yaw_deadband, 该值)
    accel_deadband_m_s2: 0.01      # 加速度 deadband

    # 2.2.6 roll/pitch 来源开关
    #
    # true：直接信任 IMU 输出的 roll/pitch，用来构造重力向量并扣重力。
    use_imu_rp_from_sample: true


# ------------------------------------------------------------
# 3. DVL 子系统
#   - Hover H1000, PD6/EPD6 文本协议
#   - BI: 体速（body / instrument frame）
#   - BE: 地速（ENU）
# ------------------------------------------------------------
dvl:
  # 是否启用 DVL 链路
  #
  # 注意：DVL 在岸上通常不可用（无底跟踪），会导致持续重连与 health=degraded。
  # 岸上调试建议先关闭；下水后再打开。
  enable: false

  driver:
    # 串口路径
    port: "/dev/ttyACM0"

    # 波特率（Hover H1000 常见为 115200）
    baud: 115200

    # 协议级过滤配置（nav_core::DvlFilterConfig）
    filter:
      enable_velocity: true      # 检查速度幅值
      enable_altitude: true      # 检查高度范围

      only_valid_flag:  true     # 只接受 valid == A 的帧
      require_all_axes: true     # 三轴速度都须为有限数

      max_abs_vel_mps: 5.0       # 单轴最大 |v| (m/s)，超出直接丢掉
      max_altitude_m:  100.0     # 最大高度（超过可能是异常）
      min_altitude_m:  0.3       # 最小高度（太近可能不准）

      min_quality:     0         # 暂不启用质量等级门限（等有数据再调）

  # 3.1 DVL 实时预处理配置（对应 nav_core::preprocess::DvlRtPreprocessorConfig）
  #
  # 目标：
  #   - BI → 统一为 BODY=FRD 体速；
  #   - BE → 统一为 ENU 速度；
  #   - 做一次简单噪声地板 / 缺失补偿。
  preprocess:
    # 水平速度噪声地板（m/s），参考 ESKF.dvl.meas_speed_eps_mps ≈ 0.07
    noise_floor_mps: 0.07

    # DVL 最大允许无更新时间（秒），超过视为“间断”
    max_gap_s: 3.0

    # 有效底跟踪高度范围
    min_bottom_alt_m: 0.3
    max_bottom_alt_m: 50.0

    # 是否在预处理阶段使用 BE 帧的垂直速度
    use_be_vertical: false


# ------------------------------------------------------------
# 3.5. Volt32 采集（日志用途）
# ------------------------------------------------------------
volt:
  enable: true
  port: "/dev/ttyUSB0"
  baud: 115200
  channels: 16


# ------------------------------------------------------------
# 4. 估计器部分：在线 ESKF + 健康监测
# ------------------------------------------------------------
estimator:
  # 是否启用在线导航估计器
  enable_online: true
  # 说明：实际运行时建议通过命令行 --eskf-config 指定；
  # 这里给一个相对路径作为默认兜底（以 nav_core 为工作目录时有效）。
  eskf_config_path: "config/eskf.yaml"

  # 因子图已下线，不再需要 enable_smoother
  enable_health: true

  # 4.1 在线导航估计器（nav_core::estimator::OnlineEstimatorConfig）
  #
  # 对齐离线 ESKF 配置：
  #   - zupt_threshold_mps ≈ dvl.zupt_speed_mps (0.04)
  #   - dvl_noise_floor_mps ≈ dvl.meas_speed_eps_mps (0.07)
  #   - IMU / DVL gap 与 loop / driver 配置统一。
  online:
    # ZUPT 判定阈值（ENU 水平速度模长 < 该值视为零速）
    zupt_threshold_mps: 0.04

    # DVL 噪声地板：小于该速度直接视为 0（配合上面 ZUPT）
    dvl_noise_floor_mps: 0.07

    # IMU / DVL 最大允许无更新时间（秒）
    max_imu_gap_s: 0.2
    max_dvl_gap_s: 3.0

    # yaw 来源（与 C++ OnlineEstimatorConfig 枚举对应）
    # 这里保留原来的策略：直接用 IMU yaw（经预处理修正后的 euler_z）
    yaw_source: "imu_euler_z"

    # DVL 体速来源：我们水平速度更新走 BI → BODY=FRD
    body_velocity_source: "instrument_frame"   # 或 "body_frame"，按实现约定

    # 是否使用 DVL 垂直速度 / 深度辅助 z 轴
    use_dvl_vertical: false

    # 重力加速度，用于内部一致性（离线/在线统一为 9.78）
    gravity_mps2: 9.78

  # 4.2 导航健康监测（nav_core::estimator::NavHealthConfig）
  #
  # 目前我们主要用它来监控：
  #   - 传感器心跳：IMU / DVL 掉线；
  #   - 传感器输入链路：stale / out-of-order / preprocess / gating 拒绝；
  #   - ESKF 一致性：DVL XY/Z 更新接受率与 NIS；
  #   - 给控制层提供“停机/降级建议”。
  health:
    # 心跳超时（ns）
    imu_timeout_ns: 200000000      # 0.2 s
    dvl_timeout_ns: 3000000000     # 3.0 s

    # DVL XY 更新的 NIS 区间
    dvl_nis_ok_max: 9.21
    dvl_nis_reject_max: 16.0

    # Z 轴更新的 NIS 区间
    z_nis_ok_max: 9.21
    z_nis_reject_max: 16.0

    # DVL / Z 更新接受率阈值
    dvl_accept_ratio_degraded: 0.70
    dvl_accept_ratio_invalid: 0.40
    z_accept_ratio_degraded: 0.70
    z_accept_ratio_invalid: 0.40

    # 统计时间窗（秒）
    stats_window_duration_s: 60.0

    # 工程建议开关
    enable_stop_suggestion:        true
    enable_reloc_suggestion:       true
    enable_speed_reduce_suggestion: true


# ------------------------------------------------------------
# 5. 二进制日志配置（多路）
# ------------------------------------------------------------
logging:
  # 总开关
  enable: true

  # 日志根目录（nav_daemon 会在这里按日期/session 再建子目录）
  # 推荐使用仓内相对路径，避免因用户名/权限差异导致日志不可用。
  # 以 nav_core 为工作目录时，../data/nav 会落到 Underwater-robot-navigation/data/nav。
  base_dir: "../data/nav"

  # 是否按日期分子目录：data/YYYY-MM-DD/...
  split_by_date: true

  # 传感器 CSV 根目录（与 Python 采集一致）
  sensor_data_root: "../data"
  log_sensor_csv: true

  # 细粒度日志开关：
  #   - raw: 驱动层刚解码出的 IMU / DVL（硬门控之后）；
  #   - processed: 预处理输出（进入 ESKF 之前）；
  #   - eskf_state: 每次状态输出（位置、速度、yaw、bias 等）；
  #   - eskf_update: 每次 DVL 更新的 diag（NIS / ratio / r_pre / r_meas 等）；
  #   - health_report: 健康监测结果（等级 + 建议）。
  log_imu_raw:        true
  log_dvl_raw:        true
  log_imu_processed:  true
  log_dvl_processed:  true
  log_eskf_state:     true
  log_eskf_update:    true
  log_health_report:  true
  log_volt_raw:       true

  # 兼容旧字段（可选；若完全迁移，可以删掉）
  log_imu:       true
  log_dvl:       true
  log_nav_state: true
  log_eskf:      true


# ------------------------------------------------------------
# 6. NavState 发布（共享内存）
# ------------------------------------------------------------
publisher:
  shm:
    enable: true

    # SHM 名称（与控制侧读取 nav_state 的配置一致）
    shm_name: "/rov_nav_state_v1"

    # SHM 大小（字节），包含 header + NavState + 预留
    shm_size: 4096
